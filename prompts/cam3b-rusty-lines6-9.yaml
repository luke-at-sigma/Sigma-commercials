prompt: >
  SCENE
  RUSTY — identical to Camera 3A. Same character, same desk, same wardrobe. Reddish-orange curly hair slightly unkempt, red beard, wrinkled navy crewneck. Continuity shot — he looks exactly as he did in 3A.

  CINEMATOGRAPHY
  Static locked-off medium close-up, framed slightly below eye level. 50mm equivalent. Shallow depth of field — Rusty sharp, background a soft wash of grey and cool white. No camera movement.
  Color palette: cool white, ash grey, muted amber skin tone, navy, slate blue. Cool white fluorescent panel light overhead; flat grey daylight from windows camera-right. No warm tones. Slightly desaturated grade. 24fps. Photorealistic.

  ACTIONS
  CRITICAL CHARACTER NOTE: Rusty does not know he is funny. He is completely sincere. He is reporting facts. He never performs. He is fine with all of his answers.

  0:00 — Rusty looking toward Specs or Oxford off-camera. Calm.
  0:05 — Speaks Line 1. Instant, one word. Complete confidence. Zero hesitation. Eyes on camera. Mouth closes on "seven." He has answered. He is satisfied.
  2:00 — Speaks Line 2. "Dollars?" — slight upward inflection, eyebrows lift fractionally. Genuine consideration. "Or possibly units." — second option, equally valid in his mind. "It could be eit—" — cut off mid-word. Mouth stays open, shaped for the start of "either." He does not finish. He does not react to being cut off.
  5:00 — Eyes drop to phone below frame. He checks it. Reads the screen.
  8:00 — Eyes lift from phone back to camera. One soft breath — single syllable of processing. Speaks Line 3. "Just me." flat, quiet, direct to lens. He does not look away. He does not apologize. He is reporting a new fact. He is fine with this answer.
  9:00–12:00 — Rusty holds his phone, looks at the screen. The silence after "Just me." runs the full remaining clip. Do not trim it.

  DIALOGUE
  RUSTY: "Forty-seven."
  RUSTY: "Dollars? Or possibly units. It could be eit—"
  RUSTY: "...uh, Just me."

