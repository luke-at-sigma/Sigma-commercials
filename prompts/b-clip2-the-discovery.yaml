model: sora-2-pro
size: 1280x720
seconds: 12

prompt: >
  SCENE
  Same three men at the same standing desk. Continuous scene — same wardrobe, same desk, same office. Laptop open. All three present. Rows of desks and blurred workers behind them.

  SPECS (LEFT): shorter South Asian man, mid-30s, black rectangular glasses, grey crewneck over collar.
  RUSTY (CENTER): stockier, reddish-orange curly hair slightly unkempt, red beard, wrinkled navy crewneck. Sincere, unbothered. Never performs.
  OXFORD (RIGHT): tall lanky, mid-to-late 30s, wavy dirty-blonde hair, light blue Oxford button-down, collar open. East Coast prep. Dry.

  CINEMATOGRAPHY
  Fast cuts between speakers — the camera is tight on whoever is talking. Medium close-up on each speaker when their line lands. Brief cuts to listener reactions between lines. No wide shots. No camera movement within shots. Each cut is clean and immediate.
  Color palette: cool white, ash grey, navy, muted amber skin tones, slate blue. Cool white fluorescent overhead; flat grey daylight from windows camera-right. No warm tones. Slightly desaturated grade. 24fps. Photorealistic.

  ACTIONS
  0:00 — ON RUSTY: Slight lean forward, eyes on laptop. Speaks Line 1. Enthusiastic. "Revenue, ad spend..." trails off — about to name more.

  1:30 — ON RUSTY: Speaks Line 2. LOVE stressed, slightly louder, eyes very slightly wider on LOVE, return immediately to neutral. Genuine excitement. He does not sense any incoming problem.

  2:30 — ON SPECS: Eyes on the laptop screen. Reads something. Speaks Line 3. He is confirming what he sees, not reacting to it. Mouth barely moves.

  4:00 — ON OXFORD: Does not look away from screen. Speaks Line 4. Stress hard on THAT, not love. Completely dry. Does not smile. THAT slightly elongated.

  5:30 — ON OXFORD: Eyes stay on laptop. Speaks Line 5. Statement, not question. No upward inflection.

  6:30 — ON RUSTY: Instant. Does not hesitate. Speaks Line 6. One word. Complete confidence. He has answered. He is satisfied.

  7:30 — ON SPECS: Speaks Line 7. Statement not question. Requesting a unit of measurement. No inflection.

  8:30 — ON RUSTY: Speaks Line 8. "Dollars?" — slight upward inflection, eyebrows lift fractionally, genuine consideration. "Or possibly units." — second option, equally valid. "It could be eit—" — cut off mid-word. Mouth stays open, shaped for the start of "either." He does not finish. He is not embarrassed.

  11:00 — BRIEF CUT TO SPECS AND OXFORD: Both looking at Rusty. Oxford blinks once.

  DIALOGUE
  RUSTY: "Look, it dashboards everything. Revenue, ad spend..."
  RUSTY: "Gary's going to LOVE it."
  SPECS: "Does that say Kayla's salary?"
  OXFORD: "Gary's going to love THAT."
  OXFORD: "What does the revenue metric say."
  RUSTY: "Forty-seven."
  SPECS: "Forty-seven what."
  RUSTY: "Dollars? Or possibly units. It could be eit—"

  SOUND
  Distant keyboard clicks. No music.
