prompt: >
  SCENE
  Same three men at the same standing desk cluster, continuous scene. Laptop still open. All three now looking at the screen. Same open-plan office behind them, workers blurred. Same wardrobe, same positions.

  RUSTY (center): stockier, reddish-orange curly hair slightly unkempt, red beard, wrinkled navy crewneck. Sincere, unbothered.
  SPECS (left): shorter South Asian man, mid-30s, black rectangular glasses, grey crewneck over collar.
  OXFORD (right): tall lanky, mid-to-late 30s, wavy dirty-blonde hair, untucked light blue Oxford button-down, collar open.

  CINEMATOGRAPHY
  Static locked-off medium-wide shot. Eye level. 35mm equivalent. Shallow depth of field — all three subjects sharp, background soft. No camera movement.
  Color palette: cool white, ash grey, navy, muted amber skin tones, slate blue. Cool white fluorescent overhead; flat grey daylight from windows camera-right. No warm tones. Slightly desaturated grade. 24fps. Photorealistic.

  ACTIONS
  0:00 — All three looking at the laptop screen in silence. Specs squints slightly at what he sees.
  0:05 — Specs reads the screen and speaks. He is confirming what he sees, not reacting to it.
  0:05–9:00 — Rapid-fire exchanges. Minimal head turns toward whoever speaks. Deadpan throughout.
  Oxford's delivery: dry weight — "Gary's going to love THAT" lands with stress on THAT, not love. Callback. He does not smile.
  Rusty answers "Forty-seven." instantly, one word, complete confidence. He has answered. He is satisfied with the answer.
  Rusty's "Dollars? Or possibly units. It could be eit—" cuts off mid-word — mouth stays open shaped for the start of "either." He does not finish. He is not embarrassed.
  9:00–10:00 — Oxford and Specs both look at Rusty. Oxford says his final line flat. He already knows the answer.
  10:00–12:00 — Rusty answers "Anyone with the link." without hesitation. Flat. Reporting a fact. All three look at the screen. Nobody moves.

  DIALOGUE
  SPECS: "Does that say Kayla's salary?"
  OXFORD: "Gary's going to love THAT."
  OXFORD: "What does the revenue metric say."
  RUSTY: "Forty-seven."
  SPECS: "Forty-seven what."
  RUSTY: "Dollars? Or possibly units. It could be eit—"
  SPECS: "Who has access to this?"
  OXFORD: "Who has the link."
  RUSTY: "Anyone with the link."

  SOUND
  Faint office hum. Distant keyboard clicks. Low HVAC. No music.
