prompt: >
  SCENE
  Same three men at the same standing desk. Continuous scene. Rusty is now holding his phone, looking at the screen. Specs and Oxford stand watching him. Background workers are looking up from their desks in the same direction — toward this group. Same open-plan office, same wardrobe.

  RUSTY (center): stockier, reddish-orange curly hair slightly unkempt, red beard, wrinkled navy crewneck. Holding phone at waist level, eyes on the screen.
  SPECS (left): shorter South Asian man, mid-30s, black rectangular glasses, grey crewneck over collar. Standing still, watching Rusty.
  OXFORD (right): tall lanky, mid-to-late 30s, wavy dirty-blonde hair, untucked light blue Oxford button-down, collar open. Standing still, watching Rusty.

  CINEMATOGRAPHY
  Static locked-off medium-wide shot. Eye level. 35mm equivalent. Shallow depth of field — all three subjects sharp, background soft. No camera movement. This shot does not move.
  Color palette: cool white, ash grey, navy, muted amber skin tones, slate blue. Cool white fluorescent overhead; flat grey daylight from windows camera-right. No warm tones. Slightly desaturated grade. 24fps. Photorealistic.

  ACTIONS
  0:00–1:00 — Rusty looks at his phone. Specs and Oxford watch him. Background workers have looked up from their desks. Multiple monitors visible in the background glow with the same Slack notification. Office is quiet.
  1:00–2:00 — Rusty lifts his eyes from the phone to camera. One breath of processing — soft, almost inaudible — then speaks his line. He does not apologize. He does not look away. He is reporting a fact. He is fine with this answer.
  2:00–12:00 — Nobody moves. Nobody speaks. Specs looks at the screen. Oxford looks at the screen. Rusty looks back at his phone. The office behind them has gone still. The hold runs the full remaining 10 seconds. The hold is the joke — do not cut it short.

  DIALOGUE
  RUSTY: "...uh, Just me."

  SOUND
  0:00 — Multiple overlapping Slack notification sounds cascade from surrounding desks — not one ping, many, simultaneous.
  1:00 — Sound fades. Office silence.
  2:00–12:00 — Near silence. Faint HVAC. No music.
