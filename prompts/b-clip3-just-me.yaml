prompt: >
  SCENE
  Same three men at the same standing desk. Continuous scene. Rusty now holding his phone. Background workers in the open-plan office have looked up from their desks — monitors glow with the same Slack notification. Same wardrobe throughout.

  SPECS (LEFT): shorter South Asian man, mid-30s, black rectangular glasses, grey crewneck over collar. Watching Rusty.
  RUSTY (CENTER): stockier, reddish-orange curly hair slightly unkempt, red beard, wrinkled navy crewneck. Holding phone, looking at screen. Sincere, unbothered.
  OXFORD (RIGHT): tall lanky, mid-to-late 30s, wavy dirty-blonde hair, light blue Oxford button-down, collar open. Watching Rusty.

  CINEMATOGRAPHY
  Fast cuts between speakers for the dialogue section, then locks off wide for the final hold. Medium close-up on each speaker when their line lands. The final hold after "Just me." cuts to a medium-wide on all three — static, locked-off, no movement. The hold does not cut again.
  Color palette: cool white, ash grey, navy, muted amber skin tones, slate blue. Cool white fluorescent overhead; flat grey daylight from windows camera-right. No warm tones. Slightly desaturated grade. 24fps. Photorealistic.

  ACTIONS
  0:00 — ON SPECS: Turns toward Rusty. Speaks Line 1. Same tone as asking for the wifi password.

  0:30 — ON OXFORD: Looks toward Rusty. Already suspects the answer. Speaks Line 2. Flat. Blinks once after.

  1:30 — ON RUSTY: Speaks Line 3. Flat. Reporting a fact. Completely unbothered. He is not being evasive — he is just telling them.

  2:30 — WIDE ON ALL THREE: Multiple Slack notification sounds cascade simultaneously across the office behind them. Monitors light up. Workers in the background look up.

  3:30 — ON RUSTY: Looking at his phone screen. Reads it. One soft breath — single syllable of processing. Eyes lift from phone to camera. Speaks Line 4. "Just me." quiet, flat, direct to lens. He does not apologize. He is reporting a new fact. He is fine with this answer.

  4:30 — WIDE LOCKED-OFF ON ALL THREE: Nobody moves. Nobody speaks. Specs looks at the screen. Oxford looks at the screen. Rusty looks back at his phone. The office behind them has gone still. This hold runs the remaining 7–8 seconds. The hold is the joke — do not cut it short.

  DIALOGUE
  SPECS: "Who has access to this?"
  OXFORD: "Who has the link."
  RUSTY: "Anyone with the link."
  RUSTY: "...uh, Just me."

  SOUND
  0:00 — Distant keyboard clicks.
  2:30 — Multiple overlapping Slack notification sounds cascade — not one ping, many simultaneous, from every direction in the office.
  3:30 — Notification sounds stop. Silence.
  4:30–12:00 — Near silence. No music.
