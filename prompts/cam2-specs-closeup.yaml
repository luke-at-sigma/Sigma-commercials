  CINEMATOGRAPHY
  Static locked-off medium close-up. Eye level. 50mm equivalent. Shallow depth of field — Specs sharp, background a soft wash of grey and cool white. No camera movement.
  Color palette: cool white, ash grey, muted amber skin tone, slate blue, navy. Cool white fluorescent panel light overhead; flat grey daylight from windows camera-right. No warm tones. Slightly desaturated grade. 24fps. Photorealistic.

  ACTIONS
  0:00–0:05 — Specs looking at the laptop screen below frame. Reads. Neutral expression.
  0:05 — Speaks Line 1. One eyebrow rises fractionally on "All." Minimal upward inflection on "it?" Eyes stay on screen.
  1:00 — Eyes move from screen to Rusty off-camera right. Completely flat. Speaks Line 2. He is confirming a product name, not questioning a life decision.
  3:00 — Eyes back to screen. Speaks Line 3. Repeats the phrase like reading a checkbox. Zero enthusiasm.
  5:00 — Eyes drop to laptop screen, reads something new. Speaks Line 4. Mouth barely moves. He is confirming what he sees, not reacting to it.
  8:00 — Speaks Line 5. Statement, not question. Requesting a unit of measurement. No inflection.
  10:00 — Turns from screen toward Rusty off-camera right. Speaks Line 6. Same tone as asking for the wifi password.

  DIALOGUE
  SPECS: "All of it?"
  SPECS: "You named it vibe coded?"
  SPECS: "Skateboard in the code. Cool."
  SPECS: "Does that say Kayla's salary?"
  SPECS: "Forty-seven what."
  SPECS: "Who has access to this?"

  SOUND
