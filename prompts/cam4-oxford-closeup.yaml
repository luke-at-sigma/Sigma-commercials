prompt: >
  SCENE
  OXFORD — tall and lanky, mid-to-late 30s, wavy dirty-blonde hair falling loosely over his forehead, untucked light blue Oxford button-down shirt, collar open — seated at a desk. Frame him so his height reads even seated — head near the top of frame, long torso visible. Open-plan office background blurred behind him.

  CINEMATOGRAPHY
  Static locked-off medium close-up. Eye level. 50mm equivalent. Shallow depth of field — Oxford sharp, background a soft wash of grey and cool white. No camera movement.
  Color palette: cool white, ash grey, slate blue, muted amber skin tone, light chambray. Cool white fluorescent panel light overhead; flat grey daylight from windows camera-right. No warm tones. Slightly desaturated grade. 24fps. Photorealistic.

  ACTIONS
  CHARACTER NOTE: Oxford has East Coast prep school energy — uptight without effort, dry. He says less than the others and means more. His words land like dropped weights. When he says "Terrifying" he is not being glib. He means it. Pauses between his lines are slightly longer than other characters — each line needs to land and sit.

  0:00 — Oxford looking toward Rusty off-camera. Waiting.
  0:05 — Speaks Line 1. Flat confirmation. Eyes on Rusty. Nothing changes in his face. Mouth closes on "it." Period.
  1:00 — Barely turns his head. Almost to himself. Speaks Line 2. One word, downward tone. Does not look at anyone. Does not elaborate.
  2:30 — Eyes return to the laptop screen below frame. Speaks Line 3. Stress lands hard on THAT — not love. Direct callback, emphasis inverted. Does not smile. THAT slightly elongated.
  4:30 — Eyes stay on laptop screen. Speaks Line 4. Statement, not question. No upward inflection. He is reading something and reporting it.
  6:30 — Eyes shift from screen to Rusty off-camera. Speaks Line 5. Completely flat. He already suspects the answer. Blinks once after.

  DIALOGUE
  OXFORD: "All of it."
  OXFORD: "Terrifying."
  OXFORD: "Gary's going to love THAT."
  OXFORD: "What does the revenue metric say."
  OXFORD: "Who has the link."

  SOUND
  Faint office hum. Low HVAC. No music.
