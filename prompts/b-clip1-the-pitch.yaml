prompt: >
  SCENE
  Three men at a standing desk in a large open-plan tech office. All three visible. Laptop open on desk between them. Energy drink can left of laptop. Hoodie slung over a nearby chair. Rows of occupied desks and workers blurred behind them.

  RUSTY (center): stockier build, reddish-orange tight curly hair slightly unkempt, red beard, navy crewneck sweatshirt visibly wrinkled and lived-in. Sloppy energy. Completely sincere. Never performs. Does not know he is funny.
  SPECS (left): shorter South Asian man, mid-30s, neat short dark hair, black rectangular glasses, grey crewneck over a collared shirt, collar just visible.
  OXFORD (right): tall and lanky, mid-to-late 30s, wavy dirty-blonde hair loosely over his forehead, untucked light blue Oxford button-down, collar open. East Coast prep — uptight without effort. Dry.

  CINEMATOGRAPHY
  Fast cuts between speakers — the camera is tight on whoever is talking. Medium close-up on each speaker when their line lands. When no one is speaking, hold briefly on the listener's reaction. No wide shots. No camera movement within shots. Each cut is clean and immediate.
  Color palette: cool white, ash grey, navy, muted amber skin tones, slate blue. Cool white fluorescent panels overhead; flat grey daylight from windows camera-right. No warm tones. Slightly desaturated grade. 24fps. Photorealistic.

  ACTIONS
  0:00 — WIDE ON GROUP: All three at desk. 0.5s hold. Rusty leans slightly forward.

  0:05 — ON RUSTY: Speaks Line 1. Slight stumble on "Guys, I've, I've" — he blew the start. Recovers instantly. Closes on "stack." with quiet genuine satisfaction. Does not acknowledge the stumble.

  1:00 — ON SPECS: Speaks Line 2. One eyebrow barely rises. Minimal upward inflection on "it?" Eyes moving from screen to Rusty.

  2:00 — ON RUSTY: Speaks Line 3. "All of it." flat and confirming. "As long as I sound confident it's true, right?" slightly softer — he is genuinely asking. Eyes drift off-camera. Gets nothing back.

  4:00 — ON SPECS: Speaks Line 4. This is the surprised-not-surprised reaction. His face does something specific here: eyebrows rise, mouth opens slightly — the expression of a man who just heard something he cannot believe and also completely can believe because it's Rusty. It's "are you serious" and "of course you did" at the same time. He is not angry. He is not amused. He is processing. The line lands flat but his face says everything before the words come out.

  6:00 — ON RUSTY: Speaks Line 5. "Yeah." single easy nod. "It's agile." stated like a feature. "Feels like a skateboard in the code." — genuine quiet pride. He is pleased with this metaphor.

  8:30 — ON SPECS: Speaks Line 6. Repeats the phrase back like reading a terms-and-conditions checkbox. Zero enthusiasm. Period, not exclamation. Eyes back to screen.

  10:30 — ON OXFORD: Speaks Line 7. Barely turns his head. Almost to himself. One word, downward tone. Does not look at anyone. Does not elaborate. He means it.

  11:30 — HOLD ON GROUP: Oxford, Specs, and Rusty all looking at the laptop. Nobody responds.

  DIALOGUE
  RUSTY: "Guys, I've vibe coded us a production analytics stack."
  SPECS: "All of it?"
  RUSTY: "All of it. As long as I sound confident it's true, right?"
  SPECS: "You named it vibe coded?"
  RUSTY: "Yeah. It's agile. Feels like a skateboard in the code."
  SPECS: "Skateboard in the code. Cool."
  OXFORD: "Terrifying."

  SOUND
  Distant keyboard clicks. No music.
