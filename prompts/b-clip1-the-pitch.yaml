prompt: >
  SCENE
  Three men stand at a cluster of desks in a large open-plan tech office. Rows of occupied desks recede behind them. Laptop open on desk between them. Energy drink can left of laptop. Hoodie slung over a nearby chair. Half-erased whiteboard soft in the far background, other workers present but blurred and unimportant.

  RUSTY (center): stockier build, reddish-orange tight curly hair slightly unkempt, red beard, navy crewneck sweatshirt visibly wrinkled and worn. Sloppy energy — not polished, not buttoned-up.
  SPECS (left): shorter South Asian man, mid-30s, neat short dark hair, black rectangular glasses, grey crewneck over a collared shirt, collar just visible.
  OXFORD (right): tall and lanky, mid-to-late 30s, wavy dirty-blonde hair falling loosely over his forehead, untucked light blue Oxford button-down, collar open. Reads East Coast prep — uptight without trying.

  CINEMATOGRAPHY
  Static locked-off medium-wide shot. Eye level. 35mm equivalent. Shallow depth of field — all three subjects sharp, background workers soft. No camera movement. No handheld wobble.
  Color palette: cool white, ash grey, navy, muted amber skin tones, slate blue. Cool white fluorescent panels overhead; flat grey daylight entering from large windows camera-right, competing with the fluorescents. No warm tones, no golden fill. Slightly desaturated grade. 24fps. Photorealistic.

  ACTIONS
  0:00 — All three standing, looking at the open laptop. Brief hold — 0.5 seconds of silence.
  0:05 — Rusty leans slightly forward, eyes on laptop, speaks first line. He does not perform. He is not aware he is funny. He is completely sincere. He believes everything he says.
  0:05–11:00 — Rapid-fire exchanges. Characters turn minimally — small head turns — toward whoever is speaking. Reactions are deadpan and immediate: Specs processes like he is reviewing a pull request. Oxford reacts with the controlled stillness of someone watching a slow-motion disaster. When Oxford says "Terrifying" he barely turns his head — almost to himself — and means it.
  11:00–12:00 — After "Gary's going to LOVE it" Rusty settles back slightly, satisfied. Oxford and Specs both look at the screen. Nobody responds. Oxford blinks once.

  DIALOGUE
  RUSTY: "I've, I've vibe coded us a production analytics stack."
  SPECS: "All of it?"
  OXFORD: "All of it."
  RUSTY: "All of it. As long as I sound confident it's true, right?"
  SPECS: "You named it vibe coded?"
  RUSTY: "Yeah. It's agile. Feels like a skateboard in the code."
  SPECS: "Skateboard in the code. Cool."
  OXFORD: "Terrifying."
  RUSTY: "Look, it dashboards everything. Revenue, ad spend..."
  RUSTY: "Gary's going to LOVE it."

  SOUND
  Faint office hum. Distant keyboard clicks. Low HVAC. No music.
